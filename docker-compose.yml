version: '3.8'

services:
  # PostgreSQL for Transactional Data (Orders, Inventory, Users)
  postgres:
    image: postgres:15-alpine
    container_name: b2b-postgres
    environment:
      POSTGRES_USER: b2b_user
      POSTGRES_PASSWORD: b2b_password
      POSTGRES_DB: b2b_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - b2b-network

  # MongoDB for Product Catalog
  mongodb:
    image: mongo:6.0
    container_name: b2b-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - b2b-network

  # Redis for Distributed Caching
  redis:
    image: redis:7.0-alpine
    container_name: b2b-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - b2b-network

  # Apache Kafka (KRaft Mode - No Zookeeper)
  kafka:
    image: bitnami/kafka:3.5
    container_name: b2b-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - b2b-network

networks:
  b2b-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
