server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**
        # Example of a secured route for future services
        # - id: product-catalog-service
        #   uri: lb://PRODUCT-CATALOG-SERVICE
        #   predicates:
        #     - Path=/products/**
        #   filters:
        #     - AuthenticationFilter

jwt:
  # This is a dummy secret for development. In production, use a secure, randomly generated string.
  secret: b2becommerceplatformverysecuresecretkey1234567890
