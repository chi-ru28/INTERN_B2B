<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Cancellation</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background-color: #f44336; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px 0; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
        .reason { background-color: #f9f9f9; border-left: 4px solid #f44336; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Order Cancelled</h2>
        </div>
        <div class="content">
            <p>Dear Customer,</p>
            <p>We regret to inform you that your order <strong>#<span th:text="${orderNumber}">12345</span></strong> has been cancelled.</p>
            <p><strong>Reason for cancellation:</strong></p>
            <div class="reason">
                <span th:text="${reason}">Insufficient stock</span>
            </div>
            <p>We sincerely apologize for the inconvenience.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 TransitOps B2B Ecommerce. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
