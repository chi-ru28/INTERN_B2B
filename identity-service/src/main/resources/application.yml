server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:h2:mem:b2b_ecommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  redis:
    host: localhost
    port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dev}
    password: ${MAIL_PASSWORD:dev}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            scope: profile, email

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/



management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true
    mail:
      enabled: true

app:
  features:
    otp: true
    google-auth: true
    email-verification: true
    registration: true
  security:
    otp:
      length: 6
      expiry: 5m
      resend-cooldown: 60s
      max-attempts: 5
      max-resend: 3
      hourly-limit: 5
      daily-limit: 20
