server:
  port: 8082

spring:
  application:
    name: product-catalog-service
  data:
    mongodb:
      uri: mongodb://root:rootpassword@localhost:27017/product_db?authSource=admin
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
